<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Rotina Mágica">
    <meta name="theme-color" content="#7c5cbf">
    <title>Rotina Mágica ✨</title>

    <!-- PWA Manifest Otimizado para APK -->
    <link rel="manifest" href="data:application/manifest+json,{
        &quot;name&quot;:&quot;Rotina Mágica ✨&quot;,
        &quot;short_name&quot;:&quot;Rotina Mágica&quot;,
        &quot;start_url&quot;:&quot;.&quot;,
        &quot;display&quot;:&quot;fullscreen&quot;,
        &quot;background_color&quot;:&quot;#1a0533&quot;,
        &quot;theme_color&quot;:&quot;#7c5cbf&quot;,
        &quot;orientation&quot;:&quot;portrait&quot;,
        &quot;icons&quot;: [
            {&quot;src&quot;:&quot;https://via.placeholder.com/192x192/7c5cbf/ffffff?text=🐭&quot;,&quot;sizes&quot;:&quot;192x192&quot;,&quot;type&quot;:&quot;image/png&quot;,&quot;purpose&quot;:&quot;any&quot;},
            {&quot;src&quot;:&quot;https://via.placeholder.com/512x512/7c5cbf/ffffff?text=🐭&quot;,&quot;sizes&quot;:&quot;512x512&quot;,&quot;type&quot;:&quot;image/png&quot;,&quot;purpose&quot;:&quot;any maskable&quot;}
        ]
    }">

    <link rel="apple-touch-icon" href="https://via.placeholder.com/192x192/7c5cbf/ffffff?text=🐭">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        html,body{height:100%;overflow:hidden;background:#1a0533}
        body{font-family:'Nunito',sans-serif}
        :root{--purple:#7c5cbf;--yellow:#FFD93D}
        #app{max-width:430px;margin:0 auto;height:100vh;background:linear-gradient(180deg,#f0f7ff,#faf5ff);display:flex;flex-direction:column;overflow:hidden}
        .screen{display:none;flex-direction:column;height:100%}
        .screen.active{display:flex}
        .routine-card{background:white;border-radius:20px;padding:15px;margin:10px;box-shadow:0 4px 15px rgba(0,0,0,0.1);display:flex;gap:15px;align-items:center}
        button{padding:12px 20px;border:none;border-radius:50px;font-weight:700;cursor:pointer}
    </style>
</head>
<body>

<div id="app">
    <!-- Tela de Configuração Inicial -->
    <div class="screen active" id="screen-setup">
        <h1 style="text-align:center;color:white;background:#7c5cbf;padding:40px 20px">🐭 Rotina Mágica</h1>
        <div style="padding:20px">
            <input id="setup-name" placeholder="Nome da criança" style="width:100%;padding:15px;font-size:18px;border-radius:12px;border:2px solid #ddd">
            <button onclick="startApp()" style="width:100%;margin-top:20px;background:#7c5cbf;color:white">Começar!</button>
        </div>
    </div>

    <!-- Tela Principal -->
    <div class="screen" id="screen-home">
        <header style="background:#7c5cbf;color:white;padding:15px;text-align:center">
            <h2 id="child-name">Rotina da Sofia 🐭</h2>
            <div id="clock" style="font-size:2.5em;font-weight:bold"></div>
        </header>
        <div style="padding:15px;flex:1;overflow:auto" id="routines-list"></div>
        <button onclick="addRoutine()" style="position:fixed;bottom:80px;right:20px;width:60px;height:60px;border-radius:50%;background:#FFD93D;font-size:30px">＋</button>
    </div>

    <!-- Timer -->
    <div class="screen" id="screen-timer" style="background:#1e1245;color:white;align-items:center;justify-content:center;text-align:center">
        <div id="timer-icon" style="font-size:100px;margin:20px"></div>
        <h2 id="timer-name"></h2>
        <div id="timer-display" style="font-size:4em;font-weight:bold;margin:20px">15:00</div>
        <button onclick="toggleTimer()" style="background:#FFD93D;color:black;padding:15px 40px;font-size:20px">▶ Iniciar</button>
        <button onclick="goTo('screen-home')" style="margin-top:20px">Voltar</button>
    </div>
</div>

<script>
// Variáveis
let routines = [
    {id:1, name:"Acordar", icon:"🌅", time:"07:00", duration:10, done:false},
    {id:2, name:"Escovar Dentes", icon:"🦷", time:"07:10", duration:5, done:false},
    {id:3, name:"Banho", icon:"🚿", time:"07:20", duration:15, done:false},
    {id:4, name:"Café da Manhã", icon:"🥐", time:"07:40", duration:20, done:false},
    {id:5, name:"Uniforme", icon:"👕", time:"08:00", duration:10, done:false},
    {id:6, name:"Escola", icon:"📚", time:"08:20", duration:30, done:false},
    {id:7, name:"Dormir", icon:"🌙", time:"20:30", duration:15, done:false}
];

let currentTimer = null;
let timeLeft = 900;

// Relógio
function updateClock() {
    setInterval(() => {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
    }, 1000);
}

// Renderizar rotinas
function renderRoutines() {
    const container = document.getElementById('routines-list');
    container.innerHTML = routines.map(r => `
        <div class="routine-card" onclick="startRoutine(${r.id})">
            <span style="font-size:40px">${r.icon}</span>
            <div>
                <strong>${r.name}</strong><br>
                <small>${r.time} • ${r.duration} min</small>
            </div>
        </div>
    `).join('');
}

function startRoutine(id) {
    const routine = routines.find(r => r.id === id);
    document.getElementById('timer-icon').textContent = routine.icon;
    document.getElementById('timer-name').textContent = routine.name;
    timeLeft = routine.duration * 60;
    document.getElementById('timer-display').textContent = `${routine.duration}:00`;
    goTo('screen-timer');
}

function toggleTimer() {
    alert("Timer iniciado! (Versão demo - o completo tem animação do ratinho)");
}

function goTo(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screen).classList.add('active');
}

function addRoutine() {
    const name = prompt("Nome da nova rotina:");
    if (name) {
        routines.push({id:Date.now(), name, icon:"⭐", time:"08:00", duration:10, done:false});
        renderRoutines();
    }
}

function startApp() {
    const name = document.getElementById('setup-name').value || "Criança";
    document.getElementById('child-name').textContent = `Rotina da ${name} 🐭`;
    goTo('screen-home');
}

// Inicializar
updateClock();
renderRoutines();
</script>

<!-- Service Worker Inline para PWA/APK -->
<script>
if ('serviceWorker' in navigator) {
    const swCode = `
        self.addEventListener('install', () => { self.skipWaiting(); });
        self.addEventListener('activate', e => { e.waitUntil(self.clients.claim()); });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    navigator.serviceWorker.register(URL.createObjectURL(blob));
}
</script>

</body>
</html>
